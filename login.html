<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ahgezha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<header class="navbar solid" id="navbar">
    <a href="index.html" class="logo">Ahgezha</a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="register.html" class="nav-cta">Register</a>
    </nav>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search venues...">
        <div id="searchDropdown" class="search-results"></div>
    </div>
</header>

<div class="form-page">
    <div class="form-page-inner">
        <div class="form-card">
            <a href="index.html" class="form-card-logo">Ahgezha</a>
            <h1 class="form-card-title">WELCOME BACK</h1>
            <p class="form-card-sub">Sign in to access your bookings and manage your events.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-form">SIGN IN</button>
            </form>
            <p class="form-footer-text">Don't have an account? <a href="register.html">Create one free</a></p>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script src="js/login.js"></script>
</body>
</html>
